services:
  postgres:
    image: postgres:16-alpine
    container_name: sistema-cobranca-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: apvistoria
      POSTGRES_PASSWORD: apvistoria
      POSTGRES_DB: sistema_cobranca
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
